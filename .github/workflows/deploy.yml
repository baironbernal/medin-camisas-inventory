name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, intl, pdo_mysql
          tools: composer, npm

      - name: Install dependencies and build assets
        run: |
          composer install
          npm install
          npm run build

      - name: Upload built assets
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          port: ${{ secrets.HOSTINGER_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          source: "public/build/*"
          target: "${{ secrets.HOSTINGER_PATH }}/public_html/build"
          overwrite: true

      - name: Deploy to Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          port: ${{ secrets.HOSTINGER_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            DOMAIN_PATH=${{ secrets.HOSTINGER_PATH }}
            PROJECT_PATH=$DOMAIN_PATH/medin-camisas-inventory
            PUBLIC_PATH=$DOMAIN_PATH/public_html

            echo "Entering project folder"
            cd $PROJECT_PATH

            echo "Pull latest code"
            git pull origin main

            echo "Install composer"
            php /usr/local/bin/composer install --no-dev --optimize-autoloader --ignore-platform-reqs

            echo "Laravel cache"
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            echo "Filament assets"
            php artisan filament:assets

            echo "Permissions"
            chmod -R 775 storage
            chmod -R 775 bootstrap/cache

            echo "Clean public_html except build"
            find $PUBLIC_PATH -mindepth 1 -maxdepth 1 ! -name build -exec rm -rf {} +

            echo "Copy public files except build"
            rsync -av --exclude=build public/ $PUBLIC_PATH/

            echo "Create .htaccess"
            printf "%s\n" \
            "<IfModule mod_rewrite.c>" \
            "RewriteEngine On" \
            "RewriteCond %{REQUEST_URI} !^/index.php" \
            "RewriteCond %{REQUEST_FILENAME} !-f" \
            "RewriteCond %{REQUEST_FILENAME} !-d" \
            "RewriteRule ^ index.php [L]" \
            "</IfModule>" > $PUBLIC_PATH/.htaccess

            echo "Create Laravel index.php"
            printf "%s\n" \
            "<?php" \
            "use Illuminate\\Foundation\\Application;" \
            "use Illuminate\\Http\\Request;" \
            "define('LARAVEL_START', microtime(true));" \
            "" \
            "if (file_exists(\$maintenance = __DIR__.'/../medin-camisas-inventory/storage/framework/maintenance.php')) {" \
            "    require \$maintenance;" \
            "}" \
            "" \
            "require __DIR__.'/../medin-camisas-inventory/vendor/autoload.php';" \
            "" \
            "/** @var Application \$app */" \
            "\$app = require_once __DIR__.'/../medin-camisas-inventory/bootstrap/app.php';" \
            "\$app->handleRequest(Request::capture());" \
            > $PUBLIC_PATH/index.php

            echo "Deployment finished"