name: Deploy to Hostinger (Updated)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, bcmath, intl, pdo_mysql
          tools: composer, npm

      - name: Clean old build folder
        run: rm -rf public/build

      - name: Install dependencies and build assets
        # Use standard 'composer' here because we are on GitHub's machine
        run: |
          composer install
          npm install
          npm run build

      - name: Prepare Hostinger build folder
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          port: ${{ secrets.HOSTINGER_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ${{ secrets.HOSTINGER_PATH }}/public/build
            rm -rf ${{ secrets.HOSTINGER_PATH }}/public/build/*

      - name: Upload built assets to Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          port: ${{ secrets.HOSTINGER_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          source: "public/build/*"
          target: "${{ secrets.HOSTINGER_PATH }}/public/build"
          overwrite: true

           # 🚀 Final deployment commands
      - name: Deploy to Hostinger
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          port: ${{ secrets.HOSTINGER_PORT }}
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            # Entramos a la carpeta del proyecto usando el secreto corregido
            cd ${{ secrets.HOSTINGER_PATH }}
            
            # Ahora los comandos sí encontrarán los archivos necesarios
            git pull origin main
            php /usr/local/bin/composer install --no-dev --optimize-autoloader --ignore-platform-reqs
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache